<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Digital - Karang Taruna RW 05</title>
    
    <style>
        /* --- CSS DASAR --- */
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
        body{line-height:1.6;color:#333;background:#f9f9f9; min-height: 100vh; display: flex; flex-direction: column;}
        
        /* HEADER RAPI: Logo Kiri, Menu Kanan */
header {
    background: #ff7a00;
    color: white;
    padding: 10px 20px;
    width: 100%; /* Memastikan header full width */
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* Memastikan konten utama berada di tengah */
.main-container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    justify-content: center; /* Mengetengahkan grid */
    align-items: start;
}

/* Memperbaiki Footer agar Full Width */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 30px 20px;
    width: 100%;
    margin-top: auto;
}

/* --- RESPONSIVE UNTUK HP --- */
@media(max-width: 768px) {
    .main-container {
        grid-template-columns: 1fr; /* Satu kolom di HP */
        margin: 20px auto;
        padding: 0 15px;
    }

    .service-card {
        padding: 25px; /* Mengurangi padding agar kartu tidak terlalu panjang */
        max-width: 400px; /* Membatasi lebar kartu agar tidak terlalu lebar */
        margin: 0 auto; /* Mengetengahkan kartu di layar HP */
    }

    .logo-area strong {
        font-size: 14px;
    }
    
    /* Memastikan tombol toggle dan logo sejajar */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }
}
<body>

<header>
    <nav style="max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
        <div class="logo-area">
            <img src="katar.png" alt="Logo" style="height: 50px; width: 50px;">
            <strong style="margin-left: 10px;">Karang Taruna RW 05</strong>
        </div>
        
        <div class="menu-toggle" onclick="toggleMenu()" style="display: none; font-size: 24px; cursor: pointer;">☰</div>
        
        <ul id="menu">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="index.html#berita">Berita</a></li>
            <li><a href="index.html">Kembali</a></li>
        </ul>
    </nav>
</header>
</header>

<main class="main-container">
    <div class="service-card">
        <div>
            <h2>Data Warga</h2>
            <p>Akses basis data warga RW 05 untuk informasi domisili dan kependudukan tingkat RT.</p>
        </div>
        <a href="index3.html" class="btn-orange">Cari Sekarang</a>
    </div>

    <div class="service-card">
        <div>
            <h2>Data Pengurus</h2>
            <p>Lihat struktur organisasi dan daftar pengurus aktif Karang Taruna RW 05 Masa Bakti 2025.</p>
        </div>
        <a href="index4.html" class="btn-orange">Cari Sekarang</a>
    </div>

    <div class="service-card">
        <div>
            <h2>Program Kerja</h2>
            <p>Informasi detail mengenai rencana kegiatan, misi organisasi, dan laporan program kerja.</p>
        </div>
        <a href="index5.html" class="btn-orange">Selanjutnya</a>
    </div>
</main>

<footer>
    <p>© 2026 Unit Kerja Karang Taruna RW 05</p>
    <p class="feth-text">Portal Digital Terpadu RW 05 - Pulo Gebang</p>
</footer>

   <script>
function toggleMenu() {
    var menu = document.getElementById("menu");
    if (menu.classList.contains("show")) {
        menu.classList.remove("show");
    } else {
        menu.classList.add("show");
    }
}

// Menutup menu jika layar di-scroll atau link diklik
window.onclick = function(event) {
    if (!event.target.matches('.menu-toggle')) {
        var menu = document.getElementById("menu");
        if (menu.classList.contains('show')) {
            menu.classList.remove('show');
        }
    }
}
</script>
</body>
</html>
